name: ⚙️ ETL Flow

on:
  schedule:
    - cron:  '0 */12 * * *'

  push:
    branches: [ "master" ]

jobs:
  deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v3
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: ⚙️ Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"

    - name: ⚙️ Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ./etl_flow/requirements.txt --no-cache-dir

    - name: ❤️ Run Tests
      run: |
        cd etl_flow && python -m pytest tests/ -v

    - name: ✅ Run ETL Flow
      env:
        SERVER_BASE_URL: ${{ secrets.SERVER_BASE_URL }}
        SERVER_USER_TOKEN: ${{ secrets.SERVER_USER_TOKEN }}
      run: |
        cd etl_flow && python -m etl_flow.workflow
