[project]
name = "etl-flow"
version = "0.1.0"
description = "ETL Flow — extract, transform, load pipeline with dotflow"
requires-python = ">=3.12"
dependencies = [
    "dotflow==0.15.0.dev7",
    "requests>=2.32.3",
    "beautifulsoup4>=4.13.3",
    "pydantic>=2.10.6",
    "python-dotenv>=1.1.0",
]

[project.optional-dependencies]
dev = ["pytest"]

[tool.poetry.dependencies]
dotflow = {version = "0.15.0.dev7", allow-prereleases = true}

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
